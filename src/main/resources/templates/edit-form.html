<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Post</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background-color: #f4f6f8;
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
        }

        .card{
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 25px;
        }

        .back-link{
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
        }

        label{
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        input,
        textarea{
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea{
            resize: vertical;
        }

        button{
            margin-top: 20px;
            padding: 8px 14px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: white;
        }

        button:hover{
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<h1>Blog Application</h1>
<a class="back-link" th:href="@{/posts}">Back to Posts</a>
<div class="card">
    <h2>Edit Post</h2>
    <form th:action="@{/posts/edit/{id}(id=${post.id})}" method="post" th:object="${post}">
        <label for="title">Title</label>
        <input type="text" id="title" placeholder="Enter Title here" th:field="*{title}" required>

        <label for="excerpt">Excerpt</label>
        <input type="text" id="excerpt" placeholder="Enter Excerpt here" th:field="*{excerpt}" required>

        <label for="content">Content</label>
        <textarea id="content" rows="10" placeholder="Enter Content here" th:field="*{content}" required>
        </textarea>

        <label for="tags">Tags</label>
        <input type="text" id="tags" placeholder="Java, Spring Boot, Backend" th:field="*{tagsInput}" required>

        <button type="submit">Save Changes</button>

    </form>

</div>

</body>
</html>
