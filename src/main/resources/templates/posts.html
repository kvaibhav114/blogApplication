<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Posts</title>

    <style>

        body{
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
            background-color: #f4f6f8;
            font-family: Arial, sans-serif;
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
        }

        .top-bar{
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 4px;
            background-color: white;
        }

        .top-bar h3{
            margin-right: auto;
        }

        .filters{
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .filters input,
        .filters select{
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button{
            padding: 8px 14px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: white;
        }

        button:hover{
            background-color: #f0f0f0;
        }

        .post-grid{
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .post-card{
            background-color: white;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #ddd;
        }

        .post-card h2{
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .meta{
            color: #666;
            margin: 5px 0;
            font-size: 14px;
        }

        .read-more{
            margin-top: 12px;
        }

        .pagination{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .pagination a{
            text-decoration: none;
            color: blue;
        }

        .pagination a:hover{
            text-decoration: underline;
        }

        .empty-message{
            text-align: center;
            margin-top: 30px;
        }

    </style>
</head>
<body>

<h1>Blog Application</h1>

<div class="top-bar">

    <h3>Posts</h3>

    <a th:href="@{/posts/new}">
        <button type="button">
            Create New Post
        </button>
    </a>

    <form th:action="@{/logout}" method="post">
        <button type="submit">
            Logout
        </button>
    </form>

</div>

<form th:action="@{/posts}" method="get" class="filters">

    <input type="text"
           name="keyword"
           placeholder="Search posts"
           th:value="${keyword}">

    <select name="tagId">

        <option value="">All Tags</option>

        <option th:each="tag : ${tags}"
                th:value="${tag.id}"
                th:text="${tag.name}"
                th:selected="${tag.id == tagId}">
        </option>

    </select>

    <select name="author">

        <option value="">All Authors</option>

        <option th:each="authorObj : ${authors}"
                th:value="${authorObj.name}"
                th:text="${authorObj.name}"
                th:selected="${authorObj.name == author}">
        </option>

    </select>

    <select name="sortField">

        <option value="publishedAt"
                th:selected="${sortField == 'publishedAt'}">
            Published Date
        </option>

        <option value="title"
                th:selected="${sortField == 'title'}">
            Title
        </option>

        <option value="author"
                th:selected="${sortField == 'author'}">
            Author
        </option>

    </select>

    <select name="order">

        <option value="asc"
                th:selected="${order == 'asc'}">
            Ascending
        </option>

        <option value="desc"
                th:selected="${order == 'desc'}">
            Descending
        </option>

    </select>

    <button type="submit">
        Apply
    </button>

</form>

<div th:if="${#lists.isEmpty(posts)}"
     class="empty-message">

    <h3>No posts found.</h3>

</div>

<div class="post-grid">

    <div th:each="post : ${posts}">

        <div class="post-card">

            <h2 th:text="${post.title}"></h2>

            <p class="meta">
                Author:
                <span th:text="${post.author != null ? post.author.name : 'Unknown'}"></span>
            </p>

            <p class="meta">
                Created:
                <span th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy, hh:mm a')}"></span>
            </p>

            <p class="meta">
                Tags:
                <span th:each="tag, iterStat : ${post.tags}">
                    <span th:text="${tag.name}"></span>
                    <span th:if="${!iterStat.last}">, </span>
                </span>
            </p>

            <form class="read-more"
                  th:action="@{/posts/{id}(id=${post.id})}"
                  method="get">

                <button type="submit">
                    Read More
                </button>

            </form>

        </div>

    </div>

</div>

<div class="pagination">

    <a th:if="${!postPage.first}"
       th:href="@{/posts(keyword=${keyword},tagId=${tagId},author=${author},sortField=${sortField},order=${order},pageNo=${currentPage - 1})}">
        Previous
    </a>

    <span>
        Page [[${currentPage + 1}]] of [[${postPage.totalPages}]]
    </span>

    <a th:if="${!postPage.last}"
       th:href="@{/posts(
            keyword=${keyword},
            tagId=${tagId},
            author=${author},
            sortField=${sortField},
            order=${order},
            pageNo=${currentPage + 1})}">
        Next
    </a>

</div>

</body>
</html>
