<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Something Went Wrong</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card{
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            width: 400px;
        }

        h1{
            margin-top: 0;
        }

        a{
            text-decoration: none;
        }

        button{
            padding: 10px 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            background-color: white;
        }

        button:hover{
            background-color: #f0f0f0;
        }

    </style>

</head>
<body>

<div class="card">

    <h1>Oops!</h1>

    <p>
        You are not allowed to access this page
        or the page does not exist.
    </p>
    <a th:href="@{/posts}">
        <button>Back To Posts</button>
    </a>

</div>

</body>
</html>
