<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>

    <style>
        body{
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f4f6f8;
        }

        .card{
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        input{
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px;
            box-sizing: border-box;
        }

        button{
            padding: 10px 15px;
            cursor: pointer;
        }

        .error{
            color: red;
        }
    </style>

</head>
<body>

<div class="card">

    <h2>Login</h2>

    <div th:if="${param.error}" class="error">
        Invalid email or password
    </div>

    <form th:action="@{/login}" method="post">

        <label>Email</label>
        <input type="email" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>

    </form>

    <br>

    <a th:href="@{/register}">
        Create Account
    </a>

</div>

</body>
</html>
